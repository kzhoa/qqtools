# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  release:
    name: build && tmp-upload
    runs-on: ubuntu-latest
    environment: pub
    permissions:
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel
      - name: Validate tag, version, and changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          tag = os.environ["TAG_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              sys.stderr.write(f"Unsupported tag format: {tag}\n")
              sys.exit(1)

          version_file = pathlib.Path("src/qqtools/version.py")
          version_text = version_file.read_text(encoding="utf-8")
          match = re.search(r'__version__\s*=\s*"([^"]+)"', version_text)
          if match is None:
              sys.stderr.write("Could not parse package version.\n")
              sys.exit(1)

          version = match.group(1)
          expected_tag = f"v{version}"
          if tag != expected_tag:
              sys.stderr.write(
                  f"Tag/version mismatch: tag={tag}, package={expected_tag}\n"
              )
              sys.exit(1)

          changelog = pathlib.Path("CHANGELOG.md")
          lines = changelog.read_text(encoding="utf-8").splitlines()
          header_re = re.compile(rf"^##\s+{re.escape(tag)}(?:\s+\(.*\))?\s*$")
          next_header_re = re.compile(r"^##\s+")

          start = None
          for index, line in enumerate(lines):
              if header_re.match(line):
                  start = index + 1
                  break

          if start is None:
              sys.stderr.write(
                  f"Missing changelog section for tag {tag} in CHANGELOG.md\n"
              )
              sys.exit(1)

          end = len(lines)
          for index in range(start, len(lines)):
              if next_header_re.match(lines[index]):
                  end = index
                  break

          body = "\n".join(lines[start:end]).strip()
          if not body:
              sys.stderr.write(
                  f"Changelog section for tag {tag} is empty.\n"
              )
              sys.exit(1)

          pathlib.Path("RELEASE_BODY.md").write_text(body + "\n", encoding="utf-8")
          PY
      - name: Build package
        run: python -m build --sdist --wheel

      - name: Release
        uses: softprops/action-gh-release@v2
        # uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        if: github.ref_type == 'tag'
        with:
          draft: false
          generate_release_notes: false
          token: ${{ secrets.ACCESS_TOKEN }}
          body_path: RELEASE_BODY.md
          files: |
            ./dist/**

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
