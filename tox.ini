[tox]
envlist = py311, py312, py313, py314, base, full, cleanup
skip_missing_interpreters = true

[testenv]
allowlist_externals =
    pytest
setenv =
    PYTHONPATH = {toxinidir}/src
passenv =
    USERNAME
    USER
deps =
    pytest
    pytest-cov
commands =
    pytest {posargs:tests/unit -q}


# Base environment: validates core functionality with lightweight dependencies.
# Intended for quick smoke/unit verification.
[testenv:base]
basepython = python3.13
commands =
    python -c "import sys; print(f'Python {sys.version}')"
    python -c "import torch; print('Torch version:', torch.__version__)"
    pytest tests/unit -v --tb=long -W default

# Full environment: validates features that require optional/full dependency set.
# Intended for broader functional/integration verification.
[testenv:full]
basepython = python3.13
usedevelop = true
deps =
    .[full]
commands =
    python -c "import sys; print(f'Python {sys.version}')"
    pytest tests/functional -v

[testenv:cleanup]
basepython = python3.13
skip_install = true
deps =
commands =
    python -c "from pathlib import Path; import shutil; root = Path(r'{toxinidir}') / 'tmp'; root.mkdir(parents=True, exist_ok=True); [shutil.rmtree(p, ignore_errors=True) if p.is_dir() else p.unlink(missing_ok=True) for p in root.iterdir()]"
